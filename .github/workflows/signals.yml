name: NSE Signals

on:
  push: 
  workflow_dispatch: 
  
  schedule:
    # Every 15 min between 03:45 and 10:00 UTC (= 09:15-15:30 IST), Mon-Fri.
    # GitHub Actions cron uses UTC. IST = UTC + 5:30.
    # 09:15 IST = 03:45 UTC; 15:30 IST = 10:00 UTC.
    - cron: "45 3 * * 1-5"
    - cron: "0,15,30,45 4-9 * * 1-5"
    - cron: "0 10 * * 1-5"
  #workflow_dispatch:  # allows manual trigger from the GitHub mobile web

jobs:
  signals:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          GOOGLE_SHEETS_CREDS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python orchestrator.py --force
